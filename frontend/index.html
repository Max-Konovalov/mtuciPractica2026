<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ТО оборудования</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><style>body{background:#f4f6f8;color:#1d2733}.app{min-height:100vh;display:grid;grid-template-columns:260px 1fr}.side{background:#17202a;color:#fff;padding:22px 18px}.mark{width:40px;height:40px;border-radius:8px;background:#2dd4bf;color:#0f172a;display:grid;place-items:center;font-weight:800}.navbtn{width:100%;border:0;border-radius:8px;background:transparent;color:#b9c2ce;text-align:left;padding:10px 12px;font-weight:600}.navbtn.active,.navbtn:hover{background:rgba(255,255,255,.1);color:#fff}.main{padding:24px}.view{display:none}.view.active{display:block}.surface{background:#fff;border:1px solid #dfe4ea;border-radius:8px}.board{display:grid;grid-template-columns:repeat(5,minmax(220px,1fr));gap:14px;overflow:auto}.col{min-height:520px;background:#eef2f5;border:1px solid #dfe4ea;border-radius:8px}.head{padding:12px;border-bottom:1px solid #dfe4ea;display:flex;justify-content:space-between;font-weight:700}.body{padding:10px;display:grid;gap:10px}.cardx{background:#fff;border:1px solid #d8dee6;border-radius:8px;padding:12px;cursor:grab}.over{outline:2px solid #0d6efd}.dot{width:10px;height:10px;border-radius:50%;display:inline-block}.low{background:#20c997}.medium{background:#0d6efd}.high{background:#fd7e14}.critical{background:#dc3545}.gantt{min-width:980px;display:grid;grid-template-columns:280px repeat(14,minmax(76px,1fr));border:1px solid #dfe4ea;border-radius:8px;background:#fff}.gcell,.ghead,.glabel{border-right:1px solid #dfe4ea;border-bottom:1px solid #dfe4ea;min-height:58px;padding:8px}.ghead{min-height:46px;background:#f8fafc;font-weight:700}.bar{width:100%;border:0;border-radius:7px;color:#fff;background:#2563eb;min-height:36px;padding:6px 8px;text-align:left;cursor:grab}.kv{display:grid;grid-template-columns:130px 1fr;gap:8px 12px}.kv dt{color:#687385}.load{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(255,255,255,.55);z-index:1055}.load.show{display:flex}@media(max-width:920px){.app{grid-template-columns:1fr}.board{grid-template-columns:repeat(5,260px)}};</style></head><body><div id="loading" class="load"><div class="spinner-border text-primary"></div></div><div class="app"><aside class="side"><div class="d-flex gap-3 align-items-center mb-4"><div class="mark">ТО</div><div><b>Maintenance</b><div class="small text-white-50">Управление работами</div></div></div><nav class="d-grid gap-2"><button class="navbtn active" data-view="req">Заявки</button><button class="navbtn" data-view="plan">Планирование ТО</button><button class="navbtn" data-view="eq">Оборудование</button><button class="navbtn" data-view="emp">Сотрудники</button></nav></aside><main class="main"><div class="d-flex flex-wrap justify-content-between gap-3 mb-3"><div><h1 id="title" class="h3 mb-1">Заявки на обслуживание</h1><div id="sub" class="text-secondary">Канбан-доска текущих работ</div></div><div class="input-group" style="max-width:520px"><span class="input-group-text">X-API-Key</span><input id="key" class="form-control" type="password"><button id="connect" class="btn btn-primary">Подключиться</button></div></div><section id="req" class="view active" data-title="Заявки на обслуживание" data-sub="Канбан-доска текущих работ"><div class="d-flex flex-wrap gap-2 mb-3"><select id="sf" class="form-select" style="max-width:190px"><option value="">Все статусы</option><option>new</option><option>assigned</option><option>in_progress</option><option>completed</option><option>cancelled</option></select><select id="pf" class="form-select" style="max-width:180px"><option value="">Все приоритеты</option><option>low</option><option>medium</option><option>high</option><option>critical</option></select><button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#rm">Добавить</button><button class="btn btn-outline-secondary" onclick="loadAll()">Обновить</button></div><div id="board" class="board"></div></section><section id="plan" class="view" data-title="Планирование ТО" data-sub="Диаграмма Ганта по плановым ППР"><div class="mb-3"><button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#rm">Добавить ППР</button> <button class="btn btn-outline-secondary" onclick="loadAll()">Обновить</button></div><div class="overflow-auto"><div id="gantt" class="gantt"></div></div></section><section id="eq" class="view" data-title="Оборудование" data-sub="Парк оборудования"><div class="d-flex gap-2 mb-3"><button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#em">Добавить</button><button class="btn btn-outline-secondary" onclick="loadAll()">Обновить</button></div><div class="table-responsive surface"><table class="table table-hover mb-0"><thead><tr><th>ID</th><th>Название</th><th>Серийный номер</th><th>Локация</th><th>Статус</th></tr></thead><tbody id="eqRows"></tbody></table></div></section><section id="emp" class="view" data-title="Сотрудники" data-sub="Команда обслуживания"><div class="d-flex gap-2 mb-3"><button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#pm">Добавить</button><button class="btn btn-outline-secondary" onclick="loadAll()">Обновить</button></div><div class="table-responsive surface"><table class="table table-hover mb-0"><thead><tr><th>ID</th><th>ФИО</th><th>Роль</th><th>Email</th></tr></thead><tbody id="empRows"></tbody></table></div></section></main></div><div class="modal fade" id="em"><div class="modal-dialog"><form id="ef" class="modal-content"><div class="modal-header"><h2 class="h5">Оборудование</h2><button class="btn-close" data-bs-dismiss="modal" type="button"></button></div><div class="modal-body"><input name="id" type="hidden"><label class="form-label w-100">Название<input name="name" class="form-control" required></label><label class="form-label w-100">Серийный номер<input name="serial_number" class="form-control" required></label><label class="form-label w-100">Локация<input name="location" class="form-control" required></label><label class="form-label w-100">Статус<select name="status" class="form-select"><option>active</option><option>maintenance</option><option>decommissioned</option></select></label></div><div class="modal-footer"><button class="btn btn-primary">Сохранить</button></div></form></div></div><div class="modal fade" id="pm"><div class="modal-dialog"><form id="pfm" class="modal-content"><div class="modal-header"><h2 class="h5">Сотрудник</h2><button class="btn-close" data-bs-dismiss="modal" type="button"></button></div><div class="modal-body"><input name="id" type="hidden"><label class="form-label w-100">ФИО<input name="full_name" class="form-control" required></label><label class="form-label w-100">Роль<select name="role" class="form-select"><option>engineer</option><option>technician</option><option>manager</option></select></label><label class="form-label w-100">Email<input name="contact_email" type="email" class="form-control" required></label></div><div class="modal-footer"><button class="btn btn-primary">Сохранить</button></div></form></div></div><div class="modal fade" id="rm"><div class="modal-dialog modal-lg"><form id="rf" class="modal-content"><div class="modal-header"><h2 class="h5">Заявка</h2><button class="btn-close" data-bs-dismiss="modal" type="button"></button></div><div class="modal-body row g-3"><input name="id" type="hidden"><div class="col-md-6"><label class="form-label w-100">Оборудование<select id="rqEq" name="equipment_id" class="form-select" required></select></label></div><div class="col-md-6"><label class="form-label w-100">Заявитель<select id="rqReq" name="requester_id" class="form-select" required></select></label></div><div class="col-md-6"><label class="form-label w-100">Исполнитель<select id="rqAs" name="assignee_id" class="form-select"></select></label></div><div class="col-md-3"><label class="form-label w-100">Тип<select name="type" class="form-select"><option>плановое</option><option>внеплановое</option><option>аварийное</option></select></label></div><div class="col-md-3"><label class="form-label w-100">Приоритет<select name="priority" class="form-select"><option>low</option><option>medium</option><option>high</option><option>critical</option></select></label></div><div class="col-md-6"><label class="form-label w-100">Статус<select name="status" class="form-select"><option>new</option><option>assigned</option><option>in_progress</option><option>completed</option><option>cancelled</option></select></label></div><div class="col-md-6"><label class="form-label w-100">Плановая дата<input name="scheduled_at" type="datetime-local" class="form-control"></label></div><div class="col-12"><label class="form-label w-100">Описание<textarea name="description" class="form-control" required></textarea></label></div></div><div class="modal-footer"><button class="btn btn-primary">Сохранить</button></div></form></div></div><div class="offcanvas offcanvas-end" id="drawer"><div class="offcanvas-header"><div><h2 id="dt" class="h5">Заявка</h2><div id="ds" class="small text-secondary"></div></div><button class="btn-close" data-bs-dismiss="offcanvas"></button></div><div class="offcanvas-body"><dl id="di" class="kv"></dl><button id="edit" class="btn btn-outline-secondary mt-3">Открыть форму</button></div></div><div class="toast-container position-fixed bottom-0 end-0 p-3"><div id="toast" class="toast"><div class="toast-header"><b class="me-auto">Система</b><button class="btn-close" data-bs-dismiss="toast"></button></div><div id="tb" class="toast-body"></div></div></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script>const API=location.hostname==='127.0.0.1'?'http://127.0.0.1:8000':'http://localhost:8000',S=[['new','Новые'],['assigned','Назначены'],['in_progress','В работе'],['completed','Готово'],['cancelled','Отменены']],st={e:[],p:[],r:[],drag:null,sel:null};key.value=localStorage.maintenance_api_key||'dev-api-key';function toast(x){tb.textContent=x;bootstrap.Toast.getOrCreateInstance(toastEl||document.getElementById('toast')).show()}function h(x){return String(x??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}async function api(p,o={}){loading.classList.add('show');try{let r=await fetch(API+p,{...o,headers:{'Content-Type':'application/json','X-API-Key':key.value,...o.headers}});if(!r.ok){let e=await r.json().catch(()=>({detail:r.statusText}));throw Error(e.detail||'Ошибка API')}return r.status===204?null:r.json()}finally{loading.classList.remove('show')}}function q(o){return'?'+new URLSearchParams(Object.entries(o).filter(([,v])=>v)).toString()}function dt(x){return x?new Date(x).toLocaleString('ru-RU'):''}function day(x){if(typeof x==='string'&&/^\d{4}-\d{2}-\d{2}/.test(x))return x.slice(0,10);let d=new Date(x);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}function fd(f){let p=Object.fromEntries(new FormData(f));['equipment_id','requester_id','assignee_id'].forEach(k=>p[k]?p[k]=+p[k]:delete p[k]);p.scheduled_at?p.scheduled_at=new Date(p.scheduled_at).toISOString():delete p.scheduled_at;delete p.id;return p}function opts(a,k){return a.map(x=>`<option value="${x.id}">${x.id} · ${h(x[k])}</option>`).join('')}function selects(){rqEq.innerHTML=opts(st.e,'name');rqReq.innerHTML=opts(st.p,'full_name');rqAs.innerHTML='<option value="">Не назначен</option>'+opts(st.p,'full_name')}async function loadAll(){st.e=await api('/equipment?limit=100');st.p=await api('/employees?limit=100');st.r=await api('/requests'+q({limit:100,status:sf.value,priority:pf.value}));selects();render()}function render(){eqRows.innerHTML=st.e.map(x=>`<tr><td>${x.id}</td><td>${h(x.name)}</td><td>${h(x.serial_number)}</td><td>${h(x.location)}</td><td>${x.status}</td></tr>`).join('');empRows.innerHTML=st.p.map(x=>`<tr><td>${x.id}</td><td>${h(x.full_name)}</td><td>${x.role}</td><td>${h(x.contact_email)}</td></tr>`).join('');board.innerHTML=S.map(([s,l])=>{let a=st.r.filter(x=>x.status===s);return `<section class="col" data-status="${s}"><div class="head"><span>${l}</span><span class="badge text-bg-light">${a.length}</span></div><div class="body">${a.map(card).join('')||'<div class="small text-secondary">Нет заявок</div>'}</div></section>`}).join('');let today=new Date();today.setHours(0,0,0,0);let days=Array.from({length:14},(_,i)=>{let d=new Date(today);d.setDate(d.getDate()+i);return d});let rows=st.r.filter(x=>x.type==='плановое'||x.scheduled_at).map(x=>`<div class="glabel">#${x.id}<div class="small text-secondary">${h(x.equipment?.name||x.description)}</div></div>`+days.map(d=>{let dy=day(d),on=dy===(x.scheduled_at?day(x.scheduled_at):day(today));return `<div class="gcell" data-day="${dy}">${on?`<button class="bar ${x.priority}" draggable="true" data-id="${x.id}">#${x.id} ${h(x.equipment?.name||x.description)}</button>`:''}</div>`}).join('')).join('');gantt.innerHTML='<div class="ghead">ППР</div>'+days.map(d=>`<div class="ghead">${d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'})}</div>`).join('')+(rows||'<div class="glabel">Нет ППР</div><div class="gcell" style="grid-column:span 14"></div>')}function card(x){return `<article class="cardx" draggable="true" data-id="${x.id}"><div class="d-flex justify-content-between"><b>#${x.id} ${h(x.equipment?.name||x.equipment_id)}</b><span class="dot ${x.priority}"></span></div><div class="small text-secondary my-2">${h(x.description)}</div><span class="badge text-bg-light">${h(x.type)}</span> <span class="badge text-bg-light">${h(x.assignee?.full_name||'Не назначен')}</span></article>`}async function patch(id,p,m){await api('/requests/'+id,{method:'PATCH',body:JSON.stringify(p)});await loadAll();m&&toast(m)}function openD(id){let x=st.r.find(v=>v.id==id);if(!x)return;st.sel=x.id;dtEl=document.getElementById('dt');dtEl.textContent='Заявка #'+x.id;ds.textContent=x.type==='плановое'?'ППР':'Заявка';di.innerHTML=`<dt>Оборудование</dt><dd>${h(x.equipment?.name||x.equipment_id)}</dd><dt>Заявитель</dt><dd>${h(x.requester?.full_name||x.requester_id)}</dd><dt>Исполнитель</dt><dd>${h(x.assignee?.full_name||'Не назначен')}</dd><dt>Статус</dt><dd>${x.status}</dd><dt>План</dt><dd>${dt(x.scheduled_at)||'Не задана'}</dd><dt>Описание</dt><dd>${h(x.description)}</dd>`;bootstrap.Offcanvas.getOrCreateInstance(drawer).show()}document.querySelectorAll('.navbtn').forEach(b=>b.onclick=()=>{document.querySelectorAll('.navbtn').forEach(x=>x.classList.toggle('active',x===b));document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===b.dataset.view));let v=document.getElementById(b.dataset.view);title.textContent=v.dataset.title;sub.textContent=v.dataset.sub});document.body.onclick=e=>{let c=e.target.closest('[data-id]');if(c&&!e.target.closest('.bar'))openD(c.dataset.id);if(e.target.classList.contains('bar'))openD(e.target.dataset.id)};document.body.ondragstart=e=>{let c=e.target.closest('[data-id]');if(c){st.drag=c.dataset.id;e.dataTransfer.effectAllowed='move'}};document.body.ondragover=e=>{let t=e.target.closest('[data-status],[data-day]');if(t){e.preventDefault();t.classList.add('over')}};document.body.ondragleave=e=>e.target.closest('[data-status],[data-day]')?.classList.remove('over');document.body.ondrop=e=>{let t=e.target.closest('[data-status],[data-day]');if(!st.drag||!t)return;e.preventDefault();t.classList.remove('over');if(t.dataset.status)patch(st.drag,{status:t.dataset.status},'Статус обновлён').catch(x=>toast(x.message));if(t.dataset.day){let d=new Date(t.dataset.day+'T09:00:00');patch(st.drag,{scheduled_at:d.toISOString(),type:'плановое'},'ППР перенесён').catch(x=>toast(x.message))}};connect.onclick=()=>{localStorage.maintenance_api_key=key.value;loadAll().then(()=>toast('Подключено')).catch(e=>toast(e.message))};sf.onchange=pf.onchange=()=>loadAll().catch(e=>toast(e.message));ef.onsubmit=async e=>{e.preventDefault();let f=e.target,id=f.elements.id.value;await api('/equipment'+(id?'/'+id:''),{method:id?'PUT':'POST',body:JSON.stringify(fd(f))});bootstrap.Modal.getInstance(em).hide();loadAll()};pfm.onsubmit=async e=>{e.preventDefault();let f=e.target,id=f.elements.id.value;await api('/employees'+(id?'/'+id:''),{method:id?'PUT':'POST',body:JSON.stringify(fd(f))});bootstrap.Modal.getInstance(pm).hide();loadAll()};rf.onsubmit=async e=>{e.preventDefault();let f=e.target,id=f.elements.id.value,p=fd(f);await api('/requests'+(id?'/'+id:''),{method:id?'PATCH':'POST',body:JSON.stringify(p)});bootstrap.Modal.getInstance(rm).hide();loadAll()};edit.onclick=()=>{let x=st.r.find(v=>v.id==st.sel),f=rf;if(!x)return;Object.entries(x).forEach(([k,v])=>f.elements[k]&&(f.elements[k].value=v??''));if(x.scheduled_at)f.elements.scheduled_at.value=x.scheduled_at.slice(0,16);bootstrap.Offcanvas.getInstance(drawer).hide();bootstrap.Modal.getOrCreateInstance(rm).show()};loadAll().catch(e=>toast(e.message));</script></body></html>
