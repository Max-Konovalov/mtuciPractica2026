services:
  postgres:
    image: postgres:16-alpine
    container_name: maintenance-postgres
    environment:
      POSTGRES_DB: maintenance_db
      POSTGRES_USER: maintenance
      POSTGRES_PASSWORD: maintenance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maintenance -d maintenance_db"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
